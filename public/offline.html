<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0284c7" />
  <title>Offline — RideByWeather</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; background: #030712; color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 420px; text-align: center; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
      border: 1px solid rgba(56, 189, 248, 0.3); background: rgba(56, 189, 248, 0.1);
      color: #38bdf8; border-radius: 999px; font-size: 13px; margin-bottom: 16px; }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: #f59e0b; }
    h1 { font-size: 28px; margin: 0 0 12px; }
    p { color: #9ca3af; line-height: 1.5; margin: 0 0 24px; }
    button { background: #0284c7; color: white; border: 0; padding: 12px 20px;
      border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 15px; }
    button:hover { background: #0369a1; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge"><span class="dot"></span> Offline</span>
    <h1>You're offline</h1>
    <p>RideByWeather needs a connection to fetch the latest forecast and Ride Score. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
