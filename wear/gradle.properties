# Tuned for a low-memory machine (8 GB RAM). Keep total build footprint small:
# single worker, no parallel projects, modest heaps. Bump these later on a
# bigger machine for faster builds.
org.gradle.jvmargs=-Xmx1280m -XX:MaxMetaspaceSize=320m -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.caching=true
kotlin.daemon.jvmargs=-Xmx448m
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official
